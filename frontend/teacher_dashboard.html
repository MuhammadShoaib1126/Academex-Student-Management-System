<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS | Teacher Dashboard</title>
    <link rel="stylesheet" href="teacher_dashboard.css">
</head>
<body>
    <div class="header">
        <div class="h-links">
            <div class="logo">
                <img id="sms-logo" src="../backend/uploads/sms_logo.jpg" alt="SMS Logo">
            </div>
            <a href="../index.html">Home</a>
            <a href="contacts.html">Contacts</a>
            <a href="support.html">Support</a>
        </div>
         <div class="user-section">
            <button class="change-password-btn" onclick="changePassword()">
                <i class="bi bi-key-fill"></i> Change Password
            </button>
            
            <button class="announcement-btn" onclick="showAnnouncementPopup()">
                <i class="bi bi-bell-fill"></i> Announcements
            </button>
             <button id="logout-btn" onclick="logout()">Logout</button>
        </div>
        <div class="h-buttons">
            <div class="img">
                <img id="user-img" src="../backend/uploads/user.png" alt="User">
            </div>
        </div>
    </div>

    <div class="main-section">
        <h1>Welcome Back!</h1>
        <div class="main-content" id="main-content">
            <h2>Your Classes</h2>
            <div id="classes-container">
                <div id="class-cards" class="class-cards">
                    <div class="class-card">
                        <h3>Class 10A</h3>
                        <p>Subject: Mathematics</p>
                        <p>Students: 30</p>
                        <button class="view-class-btn">View Class</button>
                    </div>
                </div>
            </div>
            
            <div class="table-popup" id="table-popup">
                <div class="popup-content" id="popup-content">
                    <span class="close-btn" id="close-btn" onclick="this.parentNode.parentNode.style.display='none'">&times;</span>
                    <h2 class="popup-title">Class Details</h2>
                    <div class="table-wrapper" id="table-wrapper">
                        <table id="students-table">
                            <tbody id="students-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="subjects-container">
        <button id="close-btn" onclick="this.parentNode.style.display='none'">&times;</button>
        <div>
            <h3>Select a subject: </h3>
        </div>
        <select name="" id="subjects-list">
        </select>
        <button id="view-class-stds">View Students</button>
    </div>
        
    <div id="edit-marks-modal" class="edit-marks-modal">
        <form class="edit-modal-content" id="edit-marks-form" method="post">
            <h2>Edit Marks</h2>

            <label>Student Name: <span id="edit-student-name"></span></label>
            <label>Student ID: <span id="student-id"></span></label>

            <label>Total Marks:</label>
            <input type="number" id="edit-total-marks" step="0.01" value="100" readonly>

            <label>Obtained Marks:</label>
            <input type="number" id="edit-obtained-marks" step="0.01" min="0" max="100">

            <div class="edit-modal-actions">
                <button id="save-marks-btn" type="submit">Save</button>
                <button id="cancel-edit-btn" type="button" onclick="this.parentNode.parentNode.parentNode.style.display='none'">Cancel</button>
            </div>
        </form>
    </div>

     <div class="announcement-popup" id="announcement-popup">
        <div class="popup-content">
            <button class="close-btn" onclick="hideAnnouncementPopup()">&times;</button>
            <h2 class="popup-title"><i class="bi bi-megaphone-fill"></i> School Announcements</h2>
            <div class="announcement-wrapper" id="announcement-content-area">
                
                </div>
        </div>
    </div>

</body>
<script src="teacher.js"></script>
</html>
