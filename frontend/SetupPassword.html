<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcademeX | Set New Password</title>
    <style>
        :root {
            /* Palette - Consistent Professional Dark Theme */
            --page-bg: #010610; 
            --card-bg: #0e1c45; 
            --text: #e0e6f6; 
            --indigo: #7c83f7; 
            --indigo-600: #5b4ff0; 
            --indigo-700: #3f3aa8; 
            --heading-text: #ffffff; 
            --subtle-shadow: rgba(0, 0, 0, 0.7);
            --border: rgba(124, 130, 247, 0.2); 
            --blue-gradient: linear-gradient(145deg, #2a3c8f 0%, #4a54c9 60%, #5c73f5 100%);
            --input-bg: #1c2b53; /* Darker input background for better contrast on dark cards */
            --input-border: rgba(124, 130, 247, 0.4);
            --error-text: #ff6b6b;
        }

        /* Base Styles and Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: var(--page-bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.7;
            display: flex;
            flex-direction: column;
        }
        
        /* Header/Navigation - Consistent Styling */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 80px;
            background: rgba(14, 28, 69, 0.9); 
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px var(--subtle-shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .header h3 {
            font-size: 30px;
            font-weight: 900;
            color: var(--indigo);
            letter-spacing: -1px;
        }
        
        .navlinks {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        .navlinks a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s, background 0.3s, transform 0.3s;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 16px;
        }
        
        .navlinks a:hover {
            background: rgba(124, 130, 247, 0.15);
            color: var(--indigo);
            transform: translateY(-2px);
        }

        .Login {
            background: var(--indigo);
            color: var(--heading-text);
            border-radius: 8px;
            padding: 12px 25px;
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(124, 130, 247, 0.6);
        }
        
        .Login:hover {
            background: var(--indigo-600);
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(124, 130, 247, 0.8);
        }

        /* Main Content Wrapper */
        .main-content-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
            background: var(--page-bg);
        }

        /* Set Password Form Card */
        .password-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
            border: 2px solid var(--border);
            text-align: center;
        }

        .password-card h2 {
            font-size: 2rem;
            color: var(--heading-text);
            margin-bottom: 10px;
            font-weight: 800;
        }

        .password-card p {
            color: var(--text);
            opacity: 0.8;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* Form Group Styling */
        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-weight: 600;
            font-size: 1.05rem;
        }

        .form-group input {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid var(--input-border);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--heading-text);
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input::placeholder {
            color: rgba(224, 230, 246, 0.4);
        }

        .form-group input:focus {
            border-color: var(--indigo);
            box-shadow: 0 0 10px rgba(124, 131, 247, 0.5);
            outline: none;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--indigo);
            color: var(--heading-text);
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(124, 130, 247, 0.4);
        }

        .submit-btn:hover {
            background: var(--indigo-600);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 130, 247, 0.6);
        }

        /* Media Queries */
        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }
            .navlinks {
                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .password-card {
                padding: 30px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div>
            <h3>AcademeX</h3>
        </div>
        <div class="navlinks">
            <a href="../index.html">Home</a>
            <a class="Login" href="signin_real.html">Login</a>
        </div>
    </header>
    
    <div class="main-content-wrapper">
        <div class="password-card">
            <h2>Set New Password</h2>
            <p>Please enter and confirm your new password to regain access to your account.</p>

            <form action="#" method="POST">
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" name="new_password" placeholder="Enter new password" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm New Password</label>
                    <input type="password" id="confirm-password" name="confirm_password" placeholder="Confirm new password" required>
                </div>

                <button id = "submit-btn" type="submit" class="submit-btn">
                    Reset Password
                </button>
            </form>
        </div>
    </div>
    <script src ="passwordfrontend.js"> </script>
</body>
</html>
