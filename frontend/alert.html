<!DOCTYPE html>
<html>
<head>
    <title>Custom Alert Example</title>
    <style>
        .alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .alert-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .alert-text {
            margin-bottom: 20px;
            font-size: 16px;
            color: #333;
        }

        .alert-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .alert-button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .alert-button.ok {
            background: #007bff;
            color: white;
        }

        .alert-button.cancel {
            background: #6c757d;
            color: white;
        }

        .alert-button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* Demo buttons styling */
        .demo-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 50px;
        }

        .demo-button {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Custom Alert Demo</h1>
    
    <div class="demo-buttons">
        <button class="demo-button" id="simpleAlertBtn">Show Simple Alert</button>
        <button class="demo-button" id="confirmAlertBtn">Show Confirm Alert</button>
    </div>

    <script>
        // Define the Alert function first
        

        // Demo functions
        function showSimpleAlert() {
            Alert('This is a simple alert message!', 'S');
        }

        function showConfirmAlert() {
            Alert('Are you sure you want to delete this item?', 'C')
                .then(result => {
                    if (result) {
                        console.log('User confirmed - proceeding with action');
                        alert('You clicked OK!'); // Show browser alert for demo
                    } else {
                        console.log('User cancelled - action aborted');
                        alert('You clicked Cancel!'); // Show browser alert for demo
                    }
                });
        }

        // Add event listeners after DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('simpleAlertBtn').addEventListener('click', showSimpleAlert);
            document.getElementById('confirmAlertBtn').addEventListener('click', showConfirmAlert);
        });
    </script>
</body>
</html>
